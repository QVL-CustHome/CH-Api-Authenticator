# Configuration non sensible de CH-Api-Authenticator (US-00).
# Surcharge possible par variables d'environnement préfixées CH__ (ex. CH__SERVER__PORT=9000).
# Les secrets (JWT_SECRET, MONGO_URI…) viennent exclusivement de l'environnement — voir .env.example.

[server]
# Port attendu par la Gateway (auth_service_url dans son config.yaml).
port = 8081
# Verbosité des logs : DEBUG, INFO, WARN, ERROR (cohérent avec la Gateway).
log_level = "INFO"

[token]
# Durée de vie de l'access token JWT, en minutes.
ttl_minutes = 15
# Cookie HttpOnly posé au login (US-03), lu par la Gateway (US-11).
cookie_name = "ch_token"
# false uniquement en dev local (pas de HTTPS) — true en production.
cookie_secure = false
# Refresh tokens (US-19) : durée de vie (jours) et cookie HttpOnly dédié.
refresh_ttl_days = 7
refresh_cookie_name = "ch_refresh"

[registration]
# Rôles (globaux) attribués automatiquement à l'inscription : ["role", ...].
# Vide par défaut : l'attribution passe par les endpoints d'administration.
default_roles = []

[email]
# dev : les emails sont loggés (WARN) au lieu d'être envoyés — aucun serveur requis.
# smtp : envoi réel via lettre (secrets SMTP_* dans l'environnement, voir .env.example).
mode = "dev"
from = "CustHome <no-reply@custhome.local>"

[password_reset]
# Page du front d'auth qui consommera le token : {url}?token=...
url = "http://localhost:3000/reset-password"
# Durée de vie du token one-time (minutes) — purge automatique (index TTL Mongo).
ttl_minutes = 30
